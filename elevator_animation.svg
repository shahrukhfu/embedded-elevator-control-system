<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 360" width="100%" height="100%">
  <defs>
    <!-- Gradients -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b0f19" />
      <stop offset="100%" stop-color="#111827" />
    </linearGradient>
    <linearGradient id="shaftGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1e293b" />
      <stop offset="50%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e293b" />
    </linearGradient>
    <linearGradient id="cabinGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="100%" stop-color="#0284c7" />
    </linearGradient>
    <linearGradient id="doorGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#94a3b8" />
      <stop offset="50%" stop-color="#64748b" />
      <stop offset="100%" stop-color="#475569" />
    </linearGradient>
    
    <!-- Outer Glow Filters -->
    <filter id="glowGreen" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glowRed" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glowOrange" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <style>
    /* Global Text Styling */
    .lcd-text { font-family: 'Courier New', Courier, monospace; font-weight: bold; }
    .ui-text { font-family: 'Outfit', 'Inter', -apple-system, sans-serif; font-weight: 600; }
    
    /* Animation Keyframes */
    @keyframes cabinMovement {
      0%, 12.5% { transform: translateY(220px); }    /* Floor 0 */
      31.25%, 43.75% { transform: translateY(115px); } /* Floor 1 */
      62.5%, 75% { transform: translateY(10px); }     /* Floor 2 */
      93.75%, 100% { transform: translateY(220px); }   /* Floor 0 */
    }

    @keyframes doorLeftMove {
      /* Floor 0 doors open (0.5s to 1.5s -> 3.12% to 9.38%) */
      0%, 3.12% { transform: translateX(0); }
      6.25%, 8.5% { transform: translateX(-14px); }
      11.5%, 31.25% { transform: translateX(0); }
      
      /* Floor 1 doors open (5.5s to 6.5s -> 34.38% to 40.63%) */
      31.25%, 34.38% { transform: translateX(0); }
      37.5%, 39.5% { transform: translateX(-14px); }
      43.75%, 62.5% { transform: translateX(0); }
      
      /* Floor 2 doors open (10.2s to 10.8s, interrupt at 11s, reopen, close at 11.8s) */
      62.5%, 63.75% { transform: translateX(0); }
      66.25% { transform: translateX(-14px); } /* Opened */
      68.25% { transform: translateX(-4px); }  /* Closing... */
      69.5% { transform: translateX(-14px); }  /* Safety Reopen */
      73.5% { transform: translateX(0); }      /* Closed */
      100% { transform: translateX(0); }
    }

    @keyframes doorRightMove {
      /* Floor 0 doors open */
      0%, 3.12% { transform: translateX(0); }
      6.25%, 8.5% { transform: translateX(14px); }
      11.5%, 31.25% { transform: translateX(0); }
      
      /* Floor 1 doors open */
      31.25%, 34.38% { transform: translateX(0); }
      37.5%, 39.5% { transform: translateX(14px); }
      43.75%, 62.5% { transform: translateX(0); }
      
      /* Floor 2 doors open */
      62.5%, 63.75% { transform: translateX(0); }
      66.25% { transform: translateX(14px); }
      68.25% { transform: translateX(4px); }
      69.5% { transform: translateX(14px); }
      73.5% { transform: translateX(0); }
      100% { transform: translateX(0); }
    }

    /* 7-Segment Digit Control */
    /* Digit 0: A, B, C, D, E, F = ON; G = OFF */
    /* Digit 1: B, C = ON; A, D, E, F, G = OFF */
    /* Digit 2: A, B, D, E, G = ON; C, F = OFF */
    @keyframes segA {
      0%, 21.87% { opacity: 1.0; }
      21.88%, 53.12% { opacity: 0.1; }
      53.13%, 100% { opacity: 1.0; }
    }
    @keyframes segB {
      0%, 100% { opacity: 1.0; }
    }
    @keyframes segC {
      0%, 53.12% { opacity: 1.0; }
      53.13%, 84.37% { opacity: 0.1; }
      84.38%, 100% { opacity: 1.0; }
    }
    @keyframes segD {
      0%, 21.87% { opacity: 1.0; }
      21.88%, 53.12% { opacity: 0.1; }
      53.13%, 100% { opacity: 1.0; }
    }
    @keyframes segE {
      0%, 21.87% { opacity: 1.0; }
      21.88%, 53.12% { opacity: 0.1; }
      53.13%, 100% { opacity: 1.0; }
    }
    @keyframes segF {
      0%, 21.87% { opacity: 1.0; }
      21.88%, 84.37% { opacity: 0.1; }
      84.38%, 100% { opacity: 1.0; }
    }
    @keyframes segG {
      0%, 53.12% { opacity: 0.1; }
      53.13%, 84.37% { opacity: 1.0; }
      84.38%, 100% { opacity: 0.1; }
    }

    /* Arrow indicators */
    @keyframes upArrowAnim {
      0%, 12.5% { fill: #1e293b; filter: none; }
      12.6%, 31.24% { fill: #22c55e; filter: url(#glowGreen); } /* Moving to Floor 1 */
      31.25%, 43.74% { fill: #1e293b; filter: none; }
      43.75%, 62.4% { fill: #22c55e; filter: url(#glowGreen); } /* Moving to Floor 2 */
      62.5%, 100% { fill: #1e293b; filter: none; }
    }
    @keyframes downArrowAnim {
      0%, 74.99% { fill: #1e293b; filter: none; }
      75%, 93.74% { fill: #f97316; filter: url(#glowOrange); } /* Moving down to Floor 0 */
      93.75%, 100% { fill: #1e293b; filter: none; }
    }

    /* Safety Alert Light */
    @keyframes safetyLightAnim {
      0%, 67.5% { fill: #334155; filter: none; }
      68%, 71% { fill: #ef4444; filter: url(#glowRed); } /* Active safety stop */
      71.5%, 100% { fill: #334155; filter: none; }
    }

    /* Telemetry Text Scrolling Console */
    @keyframes consoleLog {
      0%, 12.4% { transform: translateY(0px); }
      12.5%, 31.24% { transform: translateY(-20px); }
      31.25%, 43.74% { transform: translateY(-40px); }
      43.75%, 62.4% { transform: translateY(-60px); }
      62.5%, 67.4% { transform: translateY(-80px); }
      67.5%, 74.9% { transform: translateY(-100px); } /* Safety event */
      75%, 93.74% { transform: translateY(-120px); }
      93.75%, 100% { transform: translateY(-140px); }
    }

    /* Classes for Animation Bindings */
    .cabin { animation: cabinMovement 16s infinite ease-in-out; }
    .door-left { animation: doorLeftMove 16s infinite ease-in-out; }
    .door-right { animation: doorRightMove 16s infinite ease-in-out; }
    .arrow-up { animation: upArrowAnim 16s infinite ease-in-out; }
    .arrow-down { animation: downArrowAnim 16s infinite ease-in-out; }
    .safety-indicator { animation: safetyLightAnim 16s infinite ease-in-out; }
    .console-scroll { animation: consoleLog 16s infinite steps(1); }
    
    .segment-a { animation: segA 16s infinite steps(1); }
    .segment-b { animation: segB 16s infinite steps(1); }
    .segment-c { animation: segC 16s infinite steps(1); }
    .segment-d { animation: segD 16s infinite steps(1); }
    .segment-e { animation: segE 16s infinite steps(1); }
    .segment-f { animation: segF 16s infinite steps(1); }
    .segment-g { animation: segG 16s infinite steps(1); }
  </style>

  <!-- Main Background Panel -->
  <rect width="700" height="360" rx="16" fill="url(#bgGrad)" stroke="#1e293b" stroke-width="2" />

  <!-- Outer Dashboard Border Accent -->
  <rect x="5" y="5" width="690" height="350" rx="12" fill="none" stroke="#0f172a" stroke-width="2" />

  <!-- TITLE HEADER -->
  <text x="350" y="30" class="ui-text" fill="#f8fafc" font-size="14" letter-spacing="1.5" text-anchor="middle">
    PIC18F4520 ELEVATOR CONTROL SIMULATION STATUS
  </text>

  <!-- ================= LEFT: ELEVATOR SHAFT ================= -->
  <g transform="translate(30, 45)">
    <!-- Shaft Frame -->
    <rect x="0" y="0" width="80" height="295" rx="6" fill="url(#shaftGrad)" stroke="#334155" stroke-width="2" />
    
    <!-- Floor Guidelines / Cable Lines -->
    <line x1="40" y1="5" x2="40" y2="290" stroke="#1e293b" stroke-width="1.5" stroke-dasharray="4,4" />
    
    <!-- Shaft Floor Markings -->
    <text x="12" y="27" class="ui-text" fill="#475569" font-size="10">FL 2</text>
    <line x1="5" y1="30" x2="20" y2="30" stroke="#334155" stroke-width="1" />

    <text x="12" y="132" class="ui-text" fill="#475569" font-size="10">FL 1</text>
    <line x1="5" y1="135" x2="20" y2="135" stroke="#334155" stroke-width="1" />

    <text x="12" y="237" class="ui-text" fill="#475569" font-size="10">FL 0</text>
    <line x1="5" y1="240" x2="20" y2="240" stroke="#334155" stroke-width="1" />

    <!-- Animated Cabin Group -->
    <g class="cabin" transform="translate(10, 10)">
      <!-- Cabin Outer Shell -->
      <rect x="0" y="0" width="60" height="65" rx="4" fill="url(#cabinGrad)" stroke="#0ea5e9" stroke-width="1.5" />
      
      <!-- Door Opening Background -->
      <rect x="10" y="8" width="40" height="50" fill="#0f172a" />
      
      <!-- Sliding Door Left -->
      <rect x="10" y="8" width="20" height="50" rx="1" fill="url(#doorGrad)" stroke="#334155" stroke-width="0.5" class="door-left" />
      
      <!-- Sliding Door Right -->
      <rect x="30" y="8" width="20" height="50" rx="1" fill="url(#doorGrad)" stroke="#334155" stroke-width="0.5" class="door-right" />
      
      <!-- Cabin Floor Status Display (Local LCD mockup) -->
      <rect x="18" y="2" width="24" height="4" fill="#020617" />
    </g>
  </g>

  <!-- ================= MIDDLE: SYSTEM CONTROL DISPLAY ================= -->
  <g transform="translate(145, 45)">
    <!-- Panel Background -->
    <rect x="0" y="0" width="180" height="295" rx="10" fill="#0f172a" stroke="#1e293b" stroke-width="2" />
    <text x="90" y="22" class="ui-text" fill="#94a3b8" font-size="10" text-anchor="middle" letter-spacing="1">CABIN INDICATORS</text>
    
    <!-- 7-Segment Display Panel -->
    <rect x="40" y="40" width="100" height="150" rx="8" fill="#020617" stroke="#334155" stroke-width="2"/>
    <text x="90" y="55" class="ui-text" fill="#475569" font-size="9" text-anchor="middle" letter-spacing="0.5">CURRENT FLOOR</text>

    <!-- 7-Segment LED Geometry (Standard 7-Seg representation) -->
    <!-- Segments coordinate grid relative to center (90,115) -->
    <g transform="translate(75, 65)">
      <!-- Segment a (top) -->
      <rect x="5" y="0" width="20" height="4" rx="2" fill="#ef4444" class="segment-a" />
      <!-- Segment f (top-left) -->
      <rect x="0" y="4" width="4" height="20" rx="2" fill="#ef4444" class="segment-f" />
      <!-- Segment b (top-right) -->
      <rect x="26" y="4" width="4" height="20" rx="2" fill="#ef4444" class="segment-b" />
      <!-- Segment g (middle) -->
      <rect x="5" y="24" width="20" height="4" rx="2" fill="#ef4444" class="segment-g" />
      <!-- Segment e (bottom-left) -->
      <rect x="0" y="28" width="4" height="20" rx="2" fill="#ef4444" class="segment-e" />
      <!-- Segment c (bottom-right) -->
      <rect x="26" y="28" width="4" height="20" rx="2" fill="#ef4444" class="segment-c" />
      <!-- Segment d (bottom) -->
      <rect x="5" y="48" width="20" height="4" rx="2" fill="#ef4444" class="segment-d" />
    </g>

    <!-- Direction Arrow indicators -->
    <g transform="translate(40, 205)">
      <!-- Up Arrow -->
      <path d="M 20,22 L 35,5 L 50,22 Z" fill="#1e293b" class="arrow-up" />
      <!-- Down Arrow -->
      <path d="M 80,5 L 95,22 L 110,5 Z" fill="#1e293b" class="arrow-down" />
      
      <text x="35" y="32" class="ui-text" fill="#64748b" font-size="8" text-anchor="middle">UP</text>
      <text x="95" y="32" class="ui-text" fill="#64748b" font-size="8" text-anchor="middle">DOWN</text>
    </g>

    <!-- Safety Light Indicator -->
    <g transform="translate(20, 255)">
      <circle cx="20" cy="15" r="7" fill="#334155" class="safety-indicator" />
      <text x="35" y="18" class="ui-text" fill="#94a3b8" font-size="9">DOOR OBSTRUCTION ALERT</text>
    </g>
  </g>

  <!-- ================= RIGHT: TELEMETRY & LOGGING VIRTUAL TERMINAL ================= -->
  <g transform="translate(355, 45)">
    <!-- Terminal Outer Frame -->
    <rect x="0" y="0" width="315" height="295" rx="10" fill="#020617" stroke="#1e293b" stroke-width="2" />
    
    <!-- Title Bar -->
    <path d="M 0,10 A 10,10 0 0,1 10,0 L 305,0 A 10,10 0 0,1 315,10 L 315,25 L 0,25 Z" fill="#0f172a" />
    <circle cx="15" cy="12" r="4" fill="#ef4444" />
    <circle cx="27" cy="12" r="4" fill="#eab308" />
    <circle cx="39" cy="12" r="4" fill="#22c55e" />
    <text x="157" y="16" class="ui-text" fill="#64748b" font-size="9" text-anchor="middle" letter-spacing="1">UART MONITORING TERMINAL</text>

    <!-- Console Text Window Clip Path (to prevent text overflow) -->
    <clipPath id="consoleClip">
      <rect x="10" y="35" width="295" height="250" />
    </clipPath>

    <!-- Scrolling Text Group -->
    <g clip-path="url(#consoleClip)">
      <g class="console-scroll">
        <!-- Frame 0: Startup & Idle -->
        <g transform="translate(0, 40)">
          <text x="15" y="20" class="lcd-text" fill="#22c55e" font-size="10">[SYS INITIALIZE] PIC18F4520 system online</text>
          <text x="15" y="40" class="lcd-text" fill="#38bdf8" font-size="10">[FSM STATE] IDLE (Floor 0)</text>
          <text x="15" y="60" class="lcd-text" fill="#64748b" font-size="10">[DOORS] Automated Cycle: Closed</text>
          <text x="15" y="80" class="lcd-text" fill="#64748b" font-size="10">Waiting for target call request...</text>
        </g>
        
        <!-- Frame 1: Call Requested -> Start Upward Movement -->
        <g transform="translate(0, 60)">
          <text x="15" y="20" class="lcd-text" fill="#eab308" font-size="10">[EVENT] Call registered for Floor 1</text>
          <text x="15" y="40" class="lcd-text" fill="#38bdf8" font-size="10">[FSM STATE] MOVING_UP | Target: 1</text>
          <text x="15" y="60" class="lcd-text" fill="#38bdf8" font-size="10">[PWM DRIVER] Duty cycle ramped to 85%</text>
          <text x="15" y="80" class="lcd-text" fill="#64748b" font-size="10">Approaching Floor 1 switch...</text>
        </g>

        <!-- Frame 2: Arrived Floor 1 -> Doors open -->
        <g transform="translate(0, 80)">
          <text x="15" y="20" class="lcd-text" fill="#22c55e" font-size="10">[LIMIT] Reached Floor 1 switch</text>
          <text x="15" y="40" class="lcd-text" fill="#38bdf8" font-size="10">[FSM STATE] DOORS_OPENING (Floor 1)</text>
          <text x="15" y="60" class="lcd-text" fill="#64748b" font-size="10">[TIMER] Doors held open (5s delay)</text>
          <text x="15" y="80" class="lcd-text" fill="#64748b" font-size="10">Closing doors shortly...</text>
        </g>

        <!-- Frame 3: Call Requested Floor 2 -> Moving Up -->
        <g transform="translate(0, 100)">
          <text x="15" y="20" class="lcd-text" fill="#eab308" font-size="10">[EVENT] Call registered for Floor 2</text>
          <text x="15" y="40" class="lcd-text" fill="#38bdf8" font-size="10">[FSM STATE] MOVING_UP | Target: 2</text>
          <text x="15" y="60" class="lcd-text" fill="#38bdf8" font-size="10">[PWM DRIVER] Duty cycle ramped to 85%</text>
          <text x="15" y="80" class="lcd-text" fill="#64748b" font-size="10">Entering Floor 2 alignment phase...</text>
        </g>

        <!-- Frame 4: Arrive Floor 2 -> Opening Doors -->
        <g transform="translate(0, 120)">
          <text x="15" y="20" class="lcd-text" fill="#22c55e" font-size="10">[LIMIT] Reached Floor 2 switch</text>
          <text x="15" y="40" class="lcd-text" fill="#38bdf8" font-size="10">[FSM STATE] DOORS_OPENING (Floor 2)</text>
          <text x="15" y="60" class="lcd-text" fill="#64748b" font-size="10">[DOORS] Doors fully extended</text>
          <text x="15" y="80" class="lcd-text" fill="#eab308" font-size="10">[DOORS] Commencing close cycle...</text>
        </g>

        <!-- Frame 5: Safety Obstruction Event at Floor 2 -->
        <g transform="translate(0, 140)">
          <text x="15" y="20" class="lcd-text" fill="#ef4444" font-size="10">[ALERT] INTERRUPT INT0 TRIPPED</text>
          <text x="15" y="40" class="lcd-text" fill="#ef4444" font-size="10">[WARNING] Door Safety Edge Obstruction</text>
          <text x="15" y="60" class="lcd-text" fill="#38bdf8" font-size="10">[FSM STATE] Reverting to DOORS_OPENING</text>
          <text x="15" y="80" class="lcd-text" fill="#64748b" font-size="10">Resetting hold-open timer...</text>
        </g>

        <!-- Frame 6: Moving down to Floor 0 -->
        <g transform="translate(0, 160)">
          <text x="15" y="20" class="lcd-text" fill="#eab308" font-size="10">[EVENT] Call registered for Floor 0</text>
          <text x="15" y="40" class="lcd-text" fill="#38bdf8" font-size="10">[FSM STATE] MOVING_DOWN | Target: 0</text>
          <text x="15" y="60" class="lcd-text" fill="#38bdf8" font-size="10">[PWM DRIVER] Duty cycle ramped to 85%</text>
          <text x="15" y="80" class="lcd-text" fill="#64748b" font-size="10">Bypassing Floor 1 sensors...</text>
        </g>

        <!-- Frame 7: Back to Floor 0 Idle -->
        <g transform="translate(0, 180)">
          <text x="15" y="20" class="lcd-text" fill="#22c55e" font-size="10">[LIMIT] Reached Floor 0 switch</text>
          <text x="15" y="40" class="lcd-text" fill="#38bdf8" font-size="10">[FSM STATE] IDLE (Floor 0)</text>
          <text x="15" y="60" class="lcd-text" fill="#64748b" font-size="10">[SYSTEM] All request queues empty</text>
          <text x="15" y="80" class="lcd-text" fill="#22c55e" font-size="10">Standby mode active.</text>
        </g>
      </g>
    </g>
  </g>
</svg>
